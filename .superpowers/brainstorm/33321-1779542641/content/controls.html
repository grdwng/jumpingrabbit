<h2>操作方式</h2>
<p class="subtitle">玩家怎么控制小人的移动方向？</p>

<div class="options">
  <div class="option" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>方向键</h3>
      <p>上下左右方向键决定跳跃方向，经典操作</p>
    </div>
  </div>
  <div class="option" data-choice="swipe" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>滑动手势</h3>
      <p>在屏幕上滑动指定方向，移动端友好</p>
    </div>
  </div>
  <div class="option" data-choice="aim" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>瞄准点击</h3>
      <p>鼠标指向方向，点击跳跃，更精确的控制</p>
    </div>
  </div>
</div>
