<h2>游戏视觉风格</h2>
<p class="subtitle">选择你想要的美术风格方向</p>

<div class="options">
  <div class="option" data-choice="lowpoly" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Low Poly 低多边形</h3>
      <p>简洁几何体，明亮色彩，类似纪念碑谷的清新感</p>
    </div>
  </div>
  <div class="option" data-choice="pixel" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Pixel Art 像素风格</h3>
      <p>复古8-bit感，怀旧游戏机风格</p>
    </div>
  </div>
  <div class="option" data-choice="neon" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Neon 霓虹未来</h3>
      <p>深色背景，霓虹光效，科幻氛围</p>
    </div>
  </div>
  <div class="option" data-choice="cartoon" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>Cartoon 卡通风格</h3>
      <p>柔和渐变，圆润造型，轻松愉快</p>
    </div>
  </div>
</div>
