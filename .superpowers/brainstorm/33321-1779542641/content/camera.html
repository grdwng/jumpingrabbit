<h2>相机视角</h2>
<p class="subtitle">玩家怎么看这个游戏世界？</p>

<div class="options">
  <div class="option" data-choice="side" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>2D侧视角</h3>
      <p>类似跳一跳，小人从侧面看，方块也是侧面的薄片</p>
    </div>
  </div>
  <div class="option" data-choice="iso" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>等距视角 (Isometric)</h3>
      <p>45度俯视，3D方块有厚度感，经典休闲游戏风格</p>
    </div>
  </div>
  <div class="option" data-choice="follow" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>跟随视角</h3>
      <p>相机跟着小人移动，从背后看前方，沉浸感强</p>
    </div>
  </div>
  <div class="option" data-choice="topdown" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>俯视视角</h3>
      <p>从正上方看下去，类似3D版2048</p>
    </div>
  </div>
</div>
