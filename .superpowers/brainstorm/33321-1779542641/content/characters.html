<h2>角色设计选择</h2>
<p class="subtitle">选择你喜欢的角色类型</p>

<div class="options">
  <div class="option" data-choice="rabbit" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>🐰 小兔子</h3>
      <p>圆圆的耳朵，蹦蹦跳跳，粉色或白色毛色</p>
    </div>
  </div>
  <div class="option" data-choice="cat" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🐱 小猫咪</h3>
      <p>灵活的尾巴，优雅的跳跃动作，有多种毛色</p>
    </div>
  </div>
  <div class="option" data-choice="bear" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>🐻 小熊</h3>
      <p>憨厚可爱，棕色毛色，圆圆的耳朵</p>
    </div>
  </div>
  <div class="option" data-choice="boy" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>👦 小男孩</h3>
      <p>蓝色衣服，活泼可爱，圆脸设计</p>
    </div>
  </div>
  <div class="option" data-choice="girl" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>👧 小女孩</h3>
      <p>粉色衣服，扎着马尾，甜甜的笑容</p>
    </div>
  </div>
</div>

<p class="section"></p>
<p class="subtitle">可以多选，游戏内可以切换角色</p>
