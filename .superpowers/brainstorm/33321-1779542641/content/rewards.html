<h2>奖励机制</h2>
<p class="subtitle">方块上的奖励物品有哪些？</p>

<div class="options">
  <div class="option" data-choice="simple" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简单收集</h3>
      <p>只有一种奖励（金币），累计数量用于评分和过关</p>
    </div>
  </div>
  <div class="option" data-choice="duo" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>双类型</h3>
      <p>金币 + 能量块，能量块积累可触发技能/加速</p>
    </div>
  </div>
  <div class="option" data-choice="triple" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>三类型</h3>
      <p>金币 + 能量块 + 爱心，爱心=生命值，被动回复或奖励关卡使用</p>
    </div>
  </div>
</div>
