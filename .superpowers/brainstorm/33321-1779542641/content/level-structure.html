<h2>关卡结构</h2>
<p class="subtitle">方块是怎么生成和排列的？</p>

<div class="options">
  <div class="option" data-choice="random" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>随机散落</h3>
      <p>每个新方块随机出现在小人前方的某个方向，挑战玩家的预判</p>
    </div>
  </div>
  <div class="option" data-choice="path" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>预设路径</h3>
      <p>方块按固定路线生成，玩家控制节奏和顺序</p>
    </div>
  </div>
  <div class="option" data-choice="grid" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>网格排列</h3>
      <p>方块排列在3D网格上，玩家选择方向跳跃，类似跑酷</p>
    </div>
  </div>
</div>
