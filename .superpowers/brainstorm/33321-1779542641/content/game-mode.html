<h2>游戏目标与进度</h2>
<p class="subtitle">玩家玩这个游戏追求什么？</p>

<div class="options">
  <div class="option" data-choice="infinite" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>无尽模式</h3>
      <p>一直跳下去，记录最高分数，永不失败（跳空只扣生命值）</p>
    </div>
  </div>
  <div class="option" data-choice="staged" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>关卡模式</h3>
      <p>每个关卡有终点目标，完成后进入下一关，难度递增</p>
    </div>
  </div>
  <div class="option" data-choice="challenge" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>挑战模式</h3>
      <p>限定步数或时间，收集尽可能多的奖励，解锁成就</p>
    </div>
  </div>
</div>
